<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>أرقام اليمن بلس</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', Arial, sans-serif;
            background: #f5f5f5;
            direction: rtl;
        }

        .app {
            max-width: 500px;
            margin: auto;
            background: white;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .header {
            background: #e53935;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            color: white;
            font-size: 24px;
        }

        .header p {
            color: #ffcdd2;
            font-size: 12px;
            margin-top: 5px;
        }

        .tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: white;
            border: none;
            font-size: 14px;
            font-weight: bold;
            color: #888;
            cursor: pointer;
        }

        .tab-btn.active {
            color: #e53935;
            border-bottom: 3px solid #e53935;
        }

        .tab-content {
            display: none;
            padding: 20px;
            min-height: 400px;
        }

        .tab-content.active {
            display: block;
        }

        .permission-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }

        .permission-box.granted {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .permission-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .permission-text strong {
            font-size: 18px;
            display: block;
            margin-bottom: 5px;
        }

        .permission-text span {
            font-size: 12px;
            opacity: 0.9;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #e53935;
        }

        button {
            background: #e53935;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            margin: 0;
        }

        .search-box button {
            width: auto;
            padding: 0 20px;
            margin: 0;
        }

        .result-item {
            background: #f8f9fa;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border-right: 3px solid #e53935;
        }

        .result-name {
            font-weight: bold;
            font-size: 16px;
        }

        .result-number {
            color: #666;
            font-size: 12px;
            margin-top: 5px;
            direction: ltr;
        }

        .empty {
            text-align: center;
            padding: 30px;
            color: #999;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn {
            background: #ffebee;
            color: #e53935;
            width: 35px;
            padding: 5px;
            margin: 0;
            font-size: 16px;
        }

        .stats {
            text-align: center;
            padding: 15px;
            color: #666;
            font-size: 12px;
            border-top: 1px solid #eee;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>📞 أرقام اليمن بلس</h1>
        <p>كاشف الأرقام والأسماء</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="search">🔍 بحث</button>
        <button class="tab-btn" data-tab="add">➕ إضافة</button>
        <button class="tab-btn" data-tab="list">📋 أرقامي</button>
    </div>

    <div class="tab-content active" id="searchTab">
        <div id="permissionBox" class="permission-box">
            <div class="permission-icon">🔐</div>
            <div class="permission-text">
                <strong>الوصول إلى جهات الاتصال</strong>
                <span>👆 اضغط هنا لطلب الإذن 👆</span>
            </div>
        </div>
        <div class="search-box">
            <input type="tel" id="searchInput" placeholder="أدخل رقم الهاتف" dir="ltr">
            <button id="searchBtn">بحث</button>
        </div>
        <div id="searchResults"></div>
    </div>

    <div class="tab-content" id="addTab">
        <input type="text" id="contactName" placeholder="الاسم الكامل">
        <input type="tel" id="contactNumber" placeholder="رقم الهاتف" dir="ltr">
        <button id="addContactBtn">💾 حفظ الرقم</button>
    </div>

    <div class="tab-content" id="listTab">
        <div id="contactsList"></div>
        <div class="stats" id="stats"></div>
    </div>
</div>

<script>
    let database = [];
    let permissionGranted = false;
    let allContacts = [];

    const DB_KEY = "arq_database";
    const PERM_KEY = "arq_permission";

    function loadData() {
        const saved = localStorage.getItem(DB_KEY);
        database = saved ? JSON.parse(saved) : [];
        updateStats();
        displayContacts();
    }

    function saveData() {
        localStorage.setItem(DB_KEY, JSON.stringify(database));
        updateStats();
        displayContacts();
    }

    function updateStats() {
        const statsEl = document.getElementById("stats");
        if (statsEl) statsEl.innerHTML = `📚 ${database.length} اسم في قاعدة البيانات`;
    }

    async function requestPermission() {
        const box = document.getElementById("permissionBox");
        
        box.classList.remove("granted");
        box.innerHTML = `
            <div class="permission-icon">⏳</div>
            <div class="permission-text">
                <strong>جاري طلب الإذن...</strong>
                <span>الرجاء الموافقة على النافذة المنبثقة</span>
            </div>
        `;
        
        try {
            if ("contacts" in navigator && "select" in navigator.contacts) {
                const contacts = await navigator.contacts.select(["name", "tel"], { multiple: true });
                
                for (let contact of contacts) {
                    const name = contact.name && contact.name[0] ? contact.name[0] : "بدون اسم";
                    const number = contact.tel && contact.tel[0] ? contact.tel[0] : "";
                    if (number && number.length >= 7) {
                        const cleanNumber = number.replace(/[\s\-\(\)]/g, '');
                        allContacts.push({ name: name, number: cleanNumber });
                    }
                }
                
                if (allContacts.length > 0) {
                    permissionGranted = true;
                    localStorage.setItem(PERM_KEY, "true");
                    
                    let newCount = 0;
                    for (let contact of allContacts) {
                        const exists = database.some(d => d.number === contact.number);
                        if (!exists) {
                            database.push({
                                name: contact.name,
                                number: contact.number,
                                date: new Date().toLocaleString()
                            });
                            newCount++;
                        }
                    }
                    if (newCount > 0) saveData();
                    
                    box.classList.add("granted");
                    box.innerHTML = `
                        <div class="permission-icon">✅</div>
                        <div class="permission-text">
                            <strong>تم منح الإذن بنجاح!</strong>
                            <span>تمت إضافة ${allContacts.length} جهة اتصال</span>
                        </div>
                    `;
                    document.getElementById("searchBtn").disabled = false;
                    return;
                }
            }
            
            throw new Error("المتصفح لا يدعم الوصول المباشر لجهات الاتصال");
            
        } catch (error) {
            console.error("خطأ:", error);
            
            box.innerHTML = `
                <div class="permission-icon">📁</div>
                <div class="permission-text">
                    <strong>لا يمكن الوصول المباشر لجهات الاتصال</strong>
                    <span>اضغط هنا لاستيراد جهات الاتصال من ملف vCard</span>
                </div>
            `;
            
            box.onclick = importContactsFromFile;
        }
    }
    
    function importContactsFromFile() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.vcf,.csv';
        
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const box = document.getElementById("permissionBox");
            box.innerHTML = `
                <div class="permission-icon">⏳</div>
                <div class="permission-text">
                    <strong>جاري استيراد جهات الاتصال...</strong>
                    <span>الرجاء الانتظار</span>
                </div>
            `;
            
            const text = await file.text();
            const contacts = parseVCard(text);
            
            allContacts = contacts;
            permissionGranted = true;
            localStorage.setItem(PERM_KEY, "true");
            
            let newCount = 0;
            for (let contact of allContacts) {
                const exists = database.some(d => d.number === contact.number);
                if (!exists) {
                    database.push({
                        name: contact.name,
                        number: contact.number,
                        date: new Date().toLocaleString()
                    });
                    newCount++;
                }
            }
            if (newCount > 0) saveData();
            
            box.classList.add("granted");
            box.innerHTML = `
                <div class="permission-icon">✅</div>
                <div class="permission-text">
                    <strong>تم الاستيراد بنجاح!</strong>
                    <span>تمت إضافة ${allContacts.length} جهة اتصال</span>
                </div>
            `;
            document.getElementById("searchBtn").disabled = false;
        };
        
        input.click();
    }
    
    function parseVCard(text) {
        const contacts = [];
        const lines = text.split(/\r?\n/);
        let currentName = "";
        let currentPhone = "";
        
        for (let line of lines) {
            line = line.trim();
            
            if (line.startsWith("FN:") || line.startsWith("N:")) {
                currentName = line.substring(3).replace(/[;,]/g, ' ').trim();
                if (currentName.includes(";")) {
                    const parts = currentName.split(";");
                    currentName = parts[0] + " " + (parts[1] || "");
                }
            }
            else if (line.startsWith("TEL")) {
                let phone = line.replace(/^TEL[^:]*:/, '').replace(/[\s\-\(\)]/g, '');
                if (phone.match(/^\+?[0-9]{7,15}$/)) {
                    currentPhone = phone;
                    if (currentName && currentPhone) {
                        contacts.push({ name: currentName, number: currentPhone });
                    }
                }
            }
        }
        
        return contacts;
    }
    
    function checkPreviousPermission() {
        const saved = localStorage.getItem(PERM_KEY);
        if (saved === "true") {
            permissionGranted = true;
            const box = document.getElementById("permissionBox");
            box.classList.add("granted");
            box.innerHTML = `
                <div class="permission-icon">✅</div>
                <div class="permission-text">
                    <strong>تم منح الإذن مسبقاً</strong>
                    <span>يمكنك استخدام التطبيق</span>
                </div>
            `;
            document.getElementById("searchBtn").disabled = false;
        }
    }

    function searchNumber() {
        const number = document.getElementById("searchInput").value.trim();
        const resultsDiv = document.getElementById("searchResults");
        
        if (!permissionGranted) {
            resultsDiv.innerHTML = '<div class="empty">⚠️ الرجاء الضغط على الصندوق الأحمر أولاً لمنح الإذن</div>';
            return;
        }
        
        if (!number) {
            resultsDiv.innerHTML = '<div class="empty">⚠️ الرجاء إدخال رقم الهاتف</div>';
            return;
        }
        
        const results = database.filter(item => item.number === number || item.number.includes(number));
        
        if (results.length > 0) {
            let html = '';
            results.forEach((res, idx) => {
                html += `
                    <div class="result-item">
                        <div class="result-name">📱 ${res.name}</div>
                        <div class="result-number">📞 ${res.number}</div>
                    </div>
                `;
            });
            resultsDiv.innerHTML = html;
        } else {
            resultsDiv.innerHTML = `
                <div class="empty">
                    🔍 لا توجد نتائج للرقم ${number}<br>
                    <small>يمكنك إضافته من تبويب "إضافة"</small>
                </div>
            `;
        }
    }
    
    function addContact() {
        if (!permissionGranted) {
            alert("⚠️ الرجاء الضغط على الصندوق الأحمر أولاً");
            return;
        }
        
        const name = document.getElementById("contactName").value.trim();
        const number = document.getElementById("contactNumber").value.trim();
        
        if (!name || !number) {
            alert("الرجاء إدخال الاسم والرقم");
            return;
        }
        
        const exists = database.some(d => d.number === number);
        if (exists) {
            alert("هذا الرقم موجود مسبقاً");
            return;
        }
        
        database.push({
            name: name,
            number: number,
            date: new Date().toLocaleString()
        });
        
        saveData();
        
        document.getElementById("contactName").value = "";
        document.getElementById("contactNumber").value = "";
        
        alert("✅ تمت الإضافة بنجاح");
    }
    
    function displayContacts() {
        const container = document.getElementById("contactsList");
        
        if (!permissionGranted) {
            container.innerHTML = '<div class="empty">🔐 الرجاء الضغط على الصندوق الأحمر أولاً</div>';
            return;
        }
        
        if (database.length === 0) {
            container.innerHTML = '<div class="empty">📭 لا توجد أرقام في قاعدة البيانات</div>';
            return;
        }
        
        let html = '';
        database.forEach((contact, index) => {
            html += `
                <div class="result-item">
                    <div class="flex-between">
                        <div>
                            <div class="result-name">${escapeHtml(contact.name)}</div>
                            <div class="result-number">📞 ${contact.number}</div>
                        </div>
                        <button class="delete-btn" onclick="deleteContact(${index})">🗑️</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function deleteContact(index) {
        if (confirm("هل تريد حذف هذا الرقم؟")) {
            database.splice(index, 1);
            saveData();
            displayContacts();
        }
    }
    
    function setupTabs() {
        const tabs = document.querySelectorAll(".tab-btn");
        const contents = document.querySelectorAll(".tab-content");
        
        tabs.forEach(tab => {
            tab.onclick = () => {
                const tabId = tab.dataset.tab;
                tabs.forEach(t => t.classList.remove("active"));
                tab.classList.add("active");
                contents.forEach(c => c.classList.remove("active"));
                document.getElementById(tabId + "Tab").classList.add("active");
                if (tabId === "list") displayContacts();
            };
        });
    }
    
    window.onload = () => {
        loadData();
        checkPreviousPermission();
        setupTabs();
        
        document.getElementById("searchBtn").onclick = searchNumber;
        document.getElementById("addContactBtn").onclick = addContact;
        
        const box = document.getElementById("permissionBox");
        box.onclick = () => {
            if (!permissionGranted) requestPermission();
        };
        
        document.getElementById("searchInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") searchNumber();
        });
    };
</script>
</body>
</html>
